meta:
  generated_by: Codex
  purpose: Nutrient-content assumptions for DFE calculations (ESPAC)
  strict_mapping: true
  strict_mapping_version: 2
  created_from:
  - data/PRO data v1.xlsx
sources:
  organic:
    pro_dataset:
      path: data/PRO data v1.xlsx
      sheet: PRO data
      notes:
      - Strict mapping excludes processed ammonia-stripped products, mineral concentrates,
        organo-minerals, sludges and rows without Type in {fert, amend}.
      - Elemental P and K fractions are derived from P2O5 and K2O using stoichiometric
        conversion factors.
  mineral:
    references:
    - tag: MSU_Extension_Table2
      label: Mississippi State University Extension - common fertilizer analyses
      url: https://extension.msstate.edu/publications/information-sheets/useful-nutrient-management-planning-data
    - tag: OSU_Extension_Table5
      label: Oregon State University Extension EM9234 - typical fertilizer concentrations
      url: https://extension.oregonstate.edu/sites/default/files/catalog/auto/EM9234.pdf
    notes:
    - NPK_kgha is assumed to be 15-15-15 because ESPAC does not identify the grade.
    - AP_kgha uses TSP (0-45-0) and AS_kgha uses MOP (0-0-60) as representative phosphate/potash
      products.
unit_conversions:
  P2O5_to_P: 0.4364
  K2O_to_K: 0.8301
organic_from_pro_data:
