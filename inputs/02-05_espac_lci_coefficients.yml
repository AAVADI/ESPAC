simapro_classification:
  category: Agricultural
  localCategory: Agricultural
  subCategory: ECUADOR
  localSubCategory: ECUADOR

conversion_factors:
  lb_to_kg: 0.45359237
  kg_unit_factors:
    KILOGRAMO: 1.0
    LIBRA: 0.45359237
    QUINTAL: 45.359237
    TONELADA: 1000.0
    LITRO: 1.0
energy_assumptions:
  default_diesel_l_ha_irrigated: 65.15
  default_electricity_kwh_ha_irrigated: 0.0
  # Ecuador calibration applied to Scielo proxy Fuel_ha values (MJ/ha).
  # Purpose: adjust Brazil-based literature proxy levels toward expected Ecuador intensity.
  # Applied in notebook 2 only when proxy data is available for the crop.
  fuel_proxy_ecuador_calibration:
    enabled: true
    default_factor: 0.70
    by_category:
      starch: 0.75
      oil: 0.80
      horticultural: 0.65
      perennial: 0.60
      fiber: 0.70
irrigation_efficiency_by_equipment:
  surcos: 0.575
  aspersión: 0.65
  microaspersión: 0.65
  nebulización: 0.65
  goteo: 0.8
crop_water_need_mm_by_keyword:
  - keywords: [ARROZ]
    mm: 575.0
  - keywords: [MAIZ]
    mm: 650.0
  - keywords: [FREJOL, FRIJOL, BEAN]
    mm: 400.0
  - keywords: [SOYA, SOJA, SOYBEAN]
    mm: 575.0
  - keywords: [PAPA, POTATO]
    mm: 600.0
  - keywords: [TOMATE]
    mm: 600.0
  - keywords: [CEBOLLA, ONION]
    mm: 450.0
  - keywords: [BANANO, BANANA, PLATANO, ORITO]
    mm: 1700.0
  - keywords: [CAÑA DE AZÚCAR, CANA DE AZUCAR, SUGARCANE]
    mm: 2000.0
  - keywords: [CITR, NARANJA, LIMON, MANDARINA]
    mm: 1050.0

pesticide_data_sources:
  version: "2026-02-27"
  estimation_note: "Molecule shares are literature-constrained estimates anchored to ESPAC pesticide class shares (Insecticide_kgha, Herbicide_kgha, Fungicide_kgha)."
  caveat: "No single public Ecuador dataset provides molecule-level use shares by crop for all ESPAC crops; values are inferred from literature plus crop class intensities."
  source_list:
    - id: fao_agris_ecuador_tomato_practices
      type: "FAO AGRIS index record"
      url: "https://agris.fao.org/search/en/providers/122620/records/647758c23c68d546031f4da8"
      scope: "Ecuador tomato production practices and pesticide use context"
    - id: ecuador_tomato_fulltext_unl
      type: "Peer-reviewed / university journal (full text)"
      url: "https://revistas.unl.edu.ec/index.php/agropecuaria/article/download/1040/994/2807"
      scope: "Active ingredients reported in Ecuador tomato systems"
    - id: fao_agris_banana_cacao_fungicide_review
      type: "FAO AGRIS index record"
      url: "https://agris.fao.org/search/en/providers/122413/records/647469a5bf943c8c7980234c"
      scope: "Banana/cacao fungicide context including mancozeb and systemic fungicides"
    - id: iniap_rice_weed_control
      type: "INIAP technical document"
      url: "https://repositorio.iniap.gob.ec/handle/41000/1407"
      scope: "Rice herbicide context in Ecuador (e.g., propanil, atrazine)"
    - id: agrocalidad_restrictions
      type: "Ecuador regulator (AGROCALIDAD)"
      url: "https://www.agrocalidad.gob.ec/restriccion-del-uso-de-plaguicidas/"
      scope: "Regulatory restrictions/cancellations used for plausibility filtering"
    - id: agropages_ecuador_ai_market_signal
      type: "Industry market note (supporting only)"
      url: "https://news.agropages.com/News/NewsDetail---50006.htm"
      scope: "Supporting signal on active ingredient presence in Ecuador market"
  crop_profile_definitions:
    banana_like: "banana, plantain, orito, maracuya and similar perennial tropical profiles"
    solanaceae_veg: "tomato, tree tomato, potato, broccoli, onion, tobacco profile"
    rice: "rice-specific profile"
    maize_grain_legume: "maize, wheat, barley, legumes, quinoa, yuca, soya profile"
    cacao_coffee: "cacao and coffee profile"
    sugarcane_pineapple_palm: "sugarcane, pineapple, oil palm, palm heart profile"
    citrus_mango_avocado: "citrus, mango, avocado profile"
