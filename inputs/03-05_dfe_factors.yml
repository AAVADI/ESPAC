  soc_sequestration:
    purpose: Annual soil organic carbon (SOC) sequestration rates for permanent systems (pastures and perennial tree crops) in Ecuador
    method: IPCC Tier 1 tropical sequestration; Ecuador-specific calibration from regional literature, CIAT/ICRAF studies, and field evidence
    units: kg C per hectare per year (kg C/ha/yr)
    references:
    - "FAO 2023: Global assessment of soil carbon in grasslands (FAO Animal Production and Health Paper 187)"
    - "IPCC AR6 WG III Ch7 (AFOLU) - grassland and agroforestry carbon management mitigation potential"
    - "IPCC 2006 Guidelines & 2019 Refinement Vol 4: Agriculture agroforestry SOC"
    - "Tropical pasture studies: Brazil & Colombian Llanos; improved grasslands 0.4-1.8 Mg C/ha/yr"
    - "CIAT research: Coffee (shade-grown) agroforestry SOC in Andean Ecuador"
    - "ICRAF Manabí cacao-shade tree systems: SOC accumulation in humid tropical oxisols"
    - "Banana production systems: pseudostem mulching & cover crop effects on soil carbon"
    - "FAO AGRIS indexed mango orchard study: 1.53 Mg C/ha/yr SOC build rate in mango orchard"
    - "FAO AGRIS indexed oil-palm review: SOC accumulation up to 1.9 Mg C/ha/yr under organic-matter-centered management"
    - "FAO AGRIS indexed pineapple chronosequence: SOC broadly similar to pasture/forest, implying near-zero net annual change"
    - "FAO AGRIS indexed peach-palm study: peach palm SOC stocks comparable to native vegetation"
    - "FAO AGRIS indexed Latin America and Caribbean agroforestry meta-analysis: mean 0.21 Mg C/ha/yr, 95% CI 0.03-0.45"
    - "FAO modelling for sugarcane with organic inputs: 8-10 t C/ha over 12 years (~0.67-0.83 Mg C/ha/yr)"
    pasture:
      purpose: Permanent cultivated pastures (Brachiaria, Panicum species) tropical humid zones (0-1500m) in South America
      mean_kgChayr: 250.0
      min_kgChayr: 180.0
      max_kgChayr: 330.0
      notes:
      - "Mean: South America-tailored improved pasture sequestration, from FAO 2023 Figure 6 Central & South America annual increment ≈ 0.25 t C/ha/yr"
      - "Min: regional lower bound from FAO improved grassland rates (≈0.18 t C/ha/yr)"
      - "Max: South America upper potential from FAO Figure 6 regional averages (≈0.33 t C/ha/yr)"
      - "Applies to Category='cultivated_pasture' or Crop_group='forages_pastures'"
    tree_crops:
      coffee:
        purpose: Coffee shade-grown agroforestry system (Ecuador dominant practice)
        ecology: Andean highlands 800-2000m typical; native shade trees (Inga, Chalum) provide litter & root inputs
        mean_kgChayr: 1400.0
        min_kgChayr: 600.0
        max_kgChayr: 2200.0
        notes:
        - "Mean: standard shade-grown coffee with diverse upper canopy (Ecuador norm)"
        - "Min: lower shade diversity or management; monoculture coffee only ~525 kg C/ha/yr"
        - "Max: intensive agroforestry with nitrogen-fixing trees (Inga); saturated after 15-20 yrs"
        - "Source: CIAT Ecuador coffee-shade studies; Andean agroforestry literature"
      cacao:
        purpose: Cacao shade-grown traditional system (Manabí, Esmeraldas dominant)
        ecology: Humid tropical lowland-midtropics 0-1200m; natural shade integration common
        mean_kgChayr: 1100.0
        min_kgChayr: 400.0
        max_kgChayr: 1800.0
        notes:
        - "Mean: traditional Ecuadorian shade-grown cacao (already integrated shade management)"
        - "Min: poorly managed, minimal shade ecosystem services"
        - "Max: organic certification + active agroforestry; clay-rich Vertisols favor C retention"
        - "Source: ICRAF Manabí cacao-shade studies; regional agroforestry research"
      banana_plantain:
        purpose: Banana (highland & commercial) and plantain production systems
        ecology: Tropical 0-2000m; commercial monoculture baseline; potential for improvement
        mean_kgChayr: 400.0
        min_kgChayr: 100.0
        max_kgChayr: 800.0
        management_modifiers:
          pseudostem_mulching: 300.0
          legume_cover_crop: 250.0
          reduced_tillage: 150.0
        notes:
        - "Mean: commercial monoculture baseline (Los Ríos, Manabí) with frequent soil disturbance"
        - "Min: highly degraded, intensive tillage, no residue retention"
        - "Max: with pseudostem mulching + cover crops + reduced tillage"
        - "Source: FAO banana production systems; agronomic management studies"
      citrus:
        purpose: Citrus orchards (orange, lemon, mandarin, lime)
        ecology: Tropical-subtropical 500-1500m; conventional pest management typical
        mean_kgChayr: 500.0
        min_kgChayr: 150.0
        max_kgChayr: 900.0
        notes:
        - "Mean: conventional citrus with moderate management"
        - "Min: intensive tillage, pesticide-dependent systems"
        - "Max: organic management with cover crops & mulching"
        - "Source: Cross-regional inference; limited Ecuador-specific data"
      avocado:
        purpose: Avocado orchards (Ecuador Highland preference at 1500-2500m)
        ecology: Highland tropical-subtropical; moderate canopy cover
        mean_kgChayr: 850.0
        min_kgChayr: 600.0
        max_kgChayr: 1100.0
        notes:
        - "Mean: highland Ecuador avocado (Nariño-Loja regions)"
        - "Min: minimal understorey management"
        - "Max: active agroforestry with shade tree retention & mulching"
        - "Source: Litter/productivity analogue studies; limited direct field measurement"
      mango:
        purpose: Mango orchards
        ecology: Lowland to mid-elevation perennial orchard systems
        mean_kgChayr: 1530.0
        min_kgChayr: 1000.0
        max_kgChayr: 2000.0
        notes:
        - "Mean follows a FAO AGRIS indexed mango-orchard estimate of 1.53 Mg C/ha/yr"
        - "Min/max are conservative widening around the reported orchard build rate to reflect site and management variability"
      passionfruit:
        purpose: Passionfruit / maracuyÃ¡ trellised perennial fruit systems
        ecology: Perennial tropical fruit system; FAO-specific crop evidence weak
        mean_kgChayr: 210.0
        min_kgChayr: 30.0
