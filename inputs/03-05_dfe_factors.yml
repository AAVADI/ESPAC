  - KNIME direct field emissions formulas are implemented as-is unless explicitly
    documented in the notebook.
  - The ESPAC filtered CSV lacks explicit nutrient totals (N_tot/P_tot/K_tot) and
    some fertiliser product-specific nutrient contents; defaults below are configurable
    placeholders.
