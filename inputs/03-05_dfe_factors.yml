        purpose: Sugarcane rows classified as permanent in ESPAC
        ecology: Managed cane systems where SOC response depends strongly on residue and organic input return
        mean_kgChayr: 750.0
        min_kgChayr: 0.0
        max_kgChayr: 830.0
        notes:
        - "Derived from FAO modelling indicating 8-10 t C/ha over 12 years under organic-input management"
        - "Min retained at zero because FAO also indicates systems without organic inputs may be net emitters"
    notes:
    - "Sequestration occurs during system establishment and maintenance; rates plateau 15-30 years post-establishment"
    - "Tree crop rates are higher than annual crops due to continuous root inputs & litter accumulation"
    - "Management practices (shade retention, mulching, agroforestry) increase rates by 20-40% vs. monoculture"
    - "Organic systems consistently outperform conventional by 20-40% due to reduced soil disturbance & enhanced biological activity"
    - "Regional climate-elevation effects: highland (>1500m) rates are ~15% higher due to slower decomposition; coastal <500m rates ~13% lower"
