    proxy_quality: Ecuador direct
    intake_kg_head_day: 0.081
    intake_basis: as-fed
    representative_body_weight_kg:
    ration_split_pct:
      forage: 0.0
      tree_forage: 0.0
      compound_feed: 100.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 0.0
      tree_forage: 0.0
      compound_feed: 0.081
      mineral: 0.0
    note: Semipasture or free-range scavenging was not quantified in the source; proxy covers balanced feed only.
    citations:
      - title: Evaluación de parámetros productivos en crianza de gallinas criollas (gallina feliz). Patoa de Vallejo-Pujilí
        url: https://repositorio.utc.edu.ec/handle/27000/7769
        citation_note: Reports 0.081 ± 0.002 kg balanced feed per hen per day in a semipasture system in Cotopaxi.
  ovine_live:
    applies_to:
      product: ovine_live
    proxy_quality: Ecuador composite
    intake_kg_head_day: 1.272
    intake_basis: dry-matter
    representative_body_weight_kg: 60.44
    ration_split_pct:
      forage: 78.1
      tree_forage: 21.5
      compound_feed: 0.0
      mineral: 0.4
    proxy_components_kg_head_day:
      forage: 0.994
      tree_forage: 0.273
      compound_feed: 0.0
      mineral: 0.005
    note: Composite Ecuador proxy. Total intake is based on an ovine feeding trial; tree-forage share comes from Acacia mearnsii voluntary intake; mineral intake comes from a Blackbelly sheep grazing study in the Ecuadorian Amazon.
    citations:
      - title: UTA thesis by Erika Esthefanía Lluay Guilcapi (bitstream 32507)
        url: https://repositorio.uta.edu.ec/bitstream/123456789/32507/1/Tesis%20182%20Medicina%20Veterinaria%20y%20Zootecnia%20-Lluay%20Guilcapi%20Erika%20Esthefan%C3%ADa.pdf
        citation_note: Reports voluntary dry matter intake of 1268.85 g/day in weaned sheep in Ecuador.
      - title: Evaluación de la preferencia de consumo de leguminosas arbóreas con potencial forrajero en rumiantes menores
        url: https://repositorio.uta.edu.ec/items/770d67bf-97e2-485a-8227-d941b7f4e1b2
        citation_note: Reports ovine Acacia mearnssi voluntary intake of 272.50 g/kg MS and 12.60 g/kg PV^0.75 at 60.44 kg live weight.
      - title: Effect of Mineral Supplementation on the Macromineral Concentration in Blood in Pre- and Postpartum Blackbelly Sheep
        url: https://pmc.ncbi.nlm.nih.gov/articles/PMC7401505/
        citation_note: Reports 0.005 kg per animal per day mineral supplementation under free-grazing conditions in the Ecuadorian Amazon.
  goat_live:
    applies_to:
      product: goat_live
    proxy_quality: Ecuador plus fallback composite
    intake_kg_head_day: 1.011
    intake_basis: dry-matter
    representative_body_weight_kg: 23.0
    ration_split_pct:
      forage: 79.0
      tree_forage: 21.0
      compound_feed: 0.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 0.799
      tree_forage: 0.212
      compound_feed: 0.0
      mineral: 0.0
    note: Composite proxy. Total intake is a fallback mature-doe dry matter intake example; tree-forage share is based on Ecuadorian caprine preference data and native browse literature from the Ecuadorian Sierra.
    citations:
      - title: Evaluación de la preferencia de consumo de leguminosas arbóreas con potencial forrajero en rumiantes menores
        url: https://repositorio.uta.edu.ec/items/770d67bf-97e2-485a-8227-d941b7f4e1b2
        citation_note: Reports caprine Acacia melanoxylon voluntary intake of 211.07 g/kg MS and 20.155 g/kg PV^0.75 at 23 kg live weight.
      - title: Cabras Lecheras Selección y Hábitos de Consumo de Plantas Nativas en la Sierra Ecuatoriana
        url: https://polodelconocimiento.com/ojs/index.php/es/article/download/7592/pdf
        citation_note: Ecuador review identifying native browse and shrub resources as a central component of dairy goat feeding in the Sierra.
      - title: Goat Nutrition
        url: https://sfyl.ifas.ufl.edu/duval/agriculture-and-agribusiness-management/livestock-and-poultry/goats/goat-nutrition/
        citation_note: Provides a mature-doe dry matter intake example of about 1.011 kg/day (2.23 lb/day) used as fallback total intake.
  meat_poultry:
    applies_to:
      product: meat_poultry
    proxy_quality: FAO direct
    intake_kg_head_day: 0.068
    intake_basis: as-fed
    representative_body_weight_kg: 2.0
    ration_split_pct:
      forage: 0.0
      tree_forage: 0.0
      compound_feed: 100.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 0.0
      tree_forage: 0.0
      compound_feed: 0.068
      mineral: 0.0
    note: Broiler feed proxy based on FAO cumulative feed demand of 4 to 6 kg per bird to reach 2 kg live weight by 9 to 12 weeks, converted to an average daily intake.
    citations:
      - title: FAO Rural structures in the tropics
        url: https://www.fao.org/4/s1250e/S1250E0q.htm
        citation_note: Reports that one broiler grown from day-old chick to 2 kg live weight at 9 to 12 weeks requires 4 to 6 kg feed; the midpoint was annualized to about 0.068 kg/bird/day.
  horse_live:
    applies_to:
      product: horse_live
    proxy_quality: Non-Ecuador fallback inference
    intake_kg_head_day: 6.75
    intake_basis: dry-matter
    representative_body_weight_kg: 312.0
    ration_split_pct:
      forage: 100.0
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 6.75
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    note: Derived as 1.5% of body weight in forage dry matter for a representative Ecuadorian criollo horse at the midpoint of the reported 290 to 334 kg live-weight range.
    citations:
      - title: Caracterización cromohipológica y zoométrica de caballos criollos
        url: https://redi.cedia.edu.ec/document/74588
        citation_note: Reports an approximate live-weight range of 290 to 334 kg for the evaluated Ecuadorian criollo horse population; the midpoint was used as the representative horse live weight.
      - title: Understanding Hay Quality Even Good Hay Can Have Bad Things In It
        url: https://aaep.org/post/understanding-hay-quality-even-good-hay-can-have-bad-things-in-it/
        citation_note: AAEP guidance indicates horses should receive about 1 to 1.5% of body weight in forage; proxy uses the upper end and the Ecuadorian criollo horse weight midpoint adopted above.
  donkey_live:
    applies_to:
      product: donkey_live
    proxy_quality: Non-Ecuador fallback inference
    intake_kg_head_day: 3.6
    intake_basis: dry-matter
    representative_body_weight_kg: 180.0
    ration_split_pct:
      forage: 100.0
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 3.6
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    note: Derived as 2.0% of body weight in dry matter, using the midpoint of the 1.75% to 2.25% maintenance guideline for a representative 180 kg donkey.
    citations:
      - title: Management recommendations for donkeys and mules
        url: https://www.ontario.ca/page/management-recommendations-donkeys-and-mules
        citation_note: Ontario guidance gives 1.75% to 2.25% of body weight dry matter intake for maintenance in donkeys and mules; proxy uses the midpoint and a representative 180 kg body weight.
      - title: Feeding Donkeys Straw and Hay Q and A with The Donkey Sanctuary
        url: https://www.thehaypillow.com/blogs/news/feeding-donkeys-straw-and-hay-q-a-with-the-donkey-sanctuary
        citation_note: Reports research-based guidance that donkeys need about 1.5% of their body weight per day in dry feed, supporting a forage-first maintenance proxy.
  mule_live:
    applies_to:
      product: mule_live
    proxy_quality: Non-Ecuador fallback inference
    intake_kg_head_day: 7.0
    intake_basis: dry-matter
    representative_body_weight_kg: 350.0
    ration_split_pct:
      forage: 100.0
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    proxy_components_kg_head_day:
      forage: 7.0
      tree_forage: 0.0
      compound_feed: 0.0
      mineral: 0.0
    note: Derived as 2.0% of body weight in dry matter, using the midpoint of the 1.75% to 2.25% maintenance guideline for a representative 350 kg mule.
    citations:
      - title: Management recommendations for donkeys and mules
        url: https://www.ontario.ca/page/management-recommendations-donkeys-and-mules
        citation_note: Ontario guidance gives 1.75% to 2.25% of body weight dry matter intake for maintenance in donkeys and mules; proxy uses the midpoint and a representative 350 kg body weight.
